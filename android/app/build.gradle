apply plugin: 'com.android.application'

android {
    namespace = "space.houseofmates.llms"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "space.houseofmates.llms"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // Enable native library extraction for llama-server execution
        ndk {
            abiFilters 'arm64-v8a'
        }
        
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
            // ensure resources.arsc is stored uncompressed so R+ installation succeeds
            noCompress 'arsc'
        }
    }
    signingConfigs {
        release {
            storeFile file("../signing/llms-release.keystore")
            storePassword "llmsrelease"
            keyAlias "llmsRelease"
            keyPassword "llmsrelease"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true  // Extract native libs for execution
        }
    }
    
    // Verify that the packaged llama native bundle is complete.
    // Do not copy just the executable here: it must stay matched with its companion .so files.
    task verifyLlamaNativeBundle {
        doLast {
            def jniLibsDir = file("src/main/jniLibs/arm64-v8a")
            def commonFiles = [
                "libllama_server.so",
                "libllama.so",
                "libggml.so",
                "libggml-base.so"
            ]
            def localBuildFiles = [
                "libggml-cpu.so",
                "libomp.so"
            ]
            def prebuiltFiles = [
                "libllama-common.so",
                "libmtmd.so"
            ]

            def missingCommon = commonFiles.findAll { !file("${jniLibsDir}/${it}").exists() }
            def hasLocalBuildBundle = localBuildFiles.every { file("${jniLibsDir}/${it}").exists() }
            def hasPrebuiltBundle = prebuiltFiles.every { file("${jniLibsDir}/${it}").exists() }

            if (!missingCommon.isEmpty() || (!hasLocalBuildBundle && !hasPrebuiltBundle)) {
                def details = []
                if (!missingCommon.isEmpty()) {
                    details << "missing core files: ${missingCommon.join(', ')}"
                }
                if (!hasLocalBuildBundle && !hasPrebuiltBundle) {
                    details << "missing dependency set: need either ${localBuildFiles.join(', ')} or ${prebuiltFiles.join(', ')}"
                }
                throw new GradleException(
                    "Incomplete llama native bundle in ${jniLibsDir}: ${details.join('; ')}. " +
                    "Run ./scripts/build-llama-android.sh to refresh the Android llama bundle."
                )
            }
        }
    }
    
    task refreshLlamaAndroidBundle(type: Exec) {
        workingDir rootProject.projectDir.parentFile
        commandLine 'bash', './scripts/build-llama-android.sh'
    }

    preBuild.dependsOn refreshLlamaAndroidBundle
    preBuild.dependsOn verifyLlamaNativeBundle
}

tasks.register('copyDebugApkToReleases', Copy) {
    from("$buildDir/outputs/apk/debug/app-debug.apk")
    into new File(rootProject.projectDir.parentFile, "releases")
    rename { 'llms-debug.apk' }
}

afterEvaluate {
    tasks.matching { it.name == 'assembleDebug' }.configureEach {
        finalizedBy tasks.named('copyDebugApkToReleases')
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.browser:browser:1.7.0"
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
